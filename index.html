<html lang="zh-TW">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美股 ETF 即時追蹤儀表板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#111827;--card2:#1a2236;--border:#1e2d4a;--text:#e2e8f0;--dim:#8892a8;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--orange:#f59e0b;--cyan:#06b6d4;--pink:#ec4899}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%);padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header h1{font-size:1.5rem;background:linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-sub{font-size:0.75rem;color:var(--dim);margin-top:4px}
.header-info{display:flex;align-items:center;gap:16px;font-size:0.85rem;color:var(--dim)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-bar{background:var(--card);padding:8px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;font-size:0.8rem;color:var(--dim);overflow-x:auto;white-space:nowrap}
.status-bar .idx{margin-right:8px;font-weight:600}
.status-bar .up{color:var(--green)}
.status-bar .down{color:var(--red)}
.status-bar .market-state{background:rgba(59,130,246,.15);color:var(--blue);padding:2px 8px;border-radius:4px;font-weight:600}
.status-bar .load-count{margin-left:auto;color:var(--dim)}
.nav{background:var(--card2);padding:8px 24px;border-bottom:1px solid var(--border);display:flex;gap:6px;overflow-x:auto;scrollbar-width:thin}
.nav::-webkit-scrollbar{height:4px}
.nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.nav button{background:transparent;border:1px solid var(--border);color:var(--dim);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.8rem;white-space:nowrap;transition:all .2s}
.nav button:hover,.nav button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.main{padding:16px 24px;max-width:1600px;margin:0 auto}
.section{display:none}
.section.active{display:block}
.section-title{font-size:1.1rem;font-weight:700;margin-bottom:12px;padding-left:8px;border-left:3px solid var(--blue)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;transition:transform .2s,border-color .2s,box-shadow .2s;cursor:default}
.card:hover{transform:translateY(-3px);border-color:var(--blue);box-shadow:0 4px 20px rgba(59,130,246,.15)}
.card .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.card .ticker-name{font-size:0.95rem;font-weight:700;color:var(--blue)}
.card .tag{font-size:0.6rem;padding:2px 6px;border-radius:4px;background:rgba(59,130,246,.15);color:var(--blue)}
.card .full-name{font-size:0.78rem;color:var(--dim);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:2px}
.card .price{font-size:1.35rem;font-weight:700}
.card .change{font-size:0.85rem;font-weight:600}
.card .change.up{color:var(--green)}
.card .change.down{color:var(--red)}
.card .details{display:flex;gap:12px;font-size:0.7rem;color:var(--dim);margin-top:6px}
.card .details span{display:flex;flex-direction:column}
.card .details .label{font-size:0.6rem;color:var(--dim);opacity:.7}
.card .sparkline{height:32px;margin-top:8px}
.card .sparkline canvas{width:100%;height:100%}
.card.loading .price-row,.card.loading .details,.card.loading .sparkline{opacity:.3}
.summary-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:20px}
.summary-card{background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);border:1px solid var(--border);border-radius:12px;padding:18px}
.summary-card h3{font-size:0.85rem;color:var(--dim);margin-bottom:6px}
.summary-card .val{font-size:1.8rem;font-weight:700}
.summary-card .sub{font-size:0.78rem;color:var(--dim);margin-top:4px}
.loader{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.table-wrap{overflow-x:auto;margin-top:12px;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
th{text-align:left;padding:10px 12px;background:var(--card2);color:var(--dim);font-weight:600;border-bottom:1px solid var(--border);position:sticky;top:0}
td{padding:10px 12px;border-bottom:1px solid var(--border)}
tr:hover{background:rgba(59,130,246,.05)}
.heatmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:4px}
.heat-cell{padding:10px 6px;border-radius:8px;text-align:center;font-weight:600;transition:transform .2s;cursor:default}
.heat-cell:hover{transform:scale(1.08);z-index:1}
.heat-cell .ht{font-size:0.7rem;margin-top:2px}
.heat-cell .hp{font-size:0.85rem}
.refresh-btn{background:var(--blue);color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;gap:6px;transition:background .2s}
.refresh-btn:hover{background:#2563eb}
.refresh-btn:active{transform:scale(.97)}
.footer{text-align:center;padding:24px;color:var(--dim);font-size:0.75rem;border-top:1px solid var(--border);margin-top:24px;line-height:1.6}
@media(max-width:768px){.header h1{font-size:1.2rem}.grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}.main{padding:12px}.card .price{font-size:1.1rem}.summary-row{grid-template-columns:1fr 1fr}.heatmap{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}}
</style>

// ========== TAB DEFINITIONS ==========
const TABS = [
  {id:'overview',label:'總覽',tickers:['SPY','QQQ','DIA','IWM','SMH','BOTZ','ITA','XBI','URA','REMX','XLU','GLD','EWT']},
  {id:'us-index',label:'美股指數',tickers:['SPY','QQQ','DIA','IWM','VTI','VOO']},
  {id:'asia',label:'亞洲市場',tickers:['EWT','EWJ','EWY','EWH','FXI','INDA','VWO']},
  {id:'semi',label:'半導體',tickers:['SMH','SOXX','XSD','PSI','SOXQ']},
  {id:'ai',label:'AI 相關',tickers:['BOTZ','AIQ','ROBT','IRBO','CHAT','AIPI']},
  {id:'ai-infra',label:'AI 基建',tickers:['IGV','CLOU','WCLD','SKYY','HACK','CIBR']},
  {id:'software',label:'軟體',tickers:['IGV','WCLD','CLOU','BUG','SKYY','XSW']},
  {id:'defense',label:'軍工',tickers:['ITA','PPA','XAR','DFEN','SHLD','FITE']},
  {id:'drone',label:'無人機',tickers:['ARKX','ARKQ','ITA','DFEN']},
  {id:'quantum',label:'量子電腦',tickers:['QTUM','ARKQ','SMH','SOXX']},
  {id:'biotech',label:'生物科技',tickers:['XBI','IBB','BBC','ARKG','LABU','BIB']},
  {id:'nuclear',label:'核電',tickers:['URA','URNM','NLR','NUKZ']},
  {id:'rare-earth',label:'稀土',tickers:['REMX','PICK','SLX','XME']},
  {id:'utilities',label:'電力基建/設備',tickers:['XLU','VPU','IDU','GRID','POWR']},
  {id:'precious-metals',label:'貴金屬',tickers:['GLD','IAU','GDX','GDXJ','SLV','SIVR','SIL','CPER','COPX','GLTR','PPLT','DBB']},
  {id:'heatmap',label:'熱力圖',tickers:[]}
];

// ========== STATE ==========
const etfData = {};
let loadedCount = 0;
let totalToLoad = 0;
let activeTab = 'overview';
let refreshTimer = null;

// ========== DATA FETCHING ==========
const PROXIES = [
  (url) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  (url) => 'https://api.allorigins.win/get?url=' + encodeURIComponent(url),
];

const CACHE_KEY = 'etf_dashboard_cache';
const CACHE_TS_KEY = 'etf_dashboard_cache_ts';

function saveToCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    localStorage.setItem(CACHE_TS_KEY, Date.now().toString());
  } catch(e) {}
}

function loadFromCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    const ts = parseInt(localStorage.getItem(CACHE_TS_KEY) || '0');
    if (raw && (Date.now() - ts) < 24 * 60 * 60 * 1000) {
      return JSON.parse(raw);
    }
  } catch(e) {}
  return null;
}

function parseYahooResponse(json, isGetEndpoint) {
  let data = json;
  if (isGetEndpoint && json.contents) {
    data = typeof json.contents === 'string' ? JSON.parse(json.contents) : json.contents;
  }
  return data;
}

function randomDelay(min, max) {
  return new Promise(r => setTimeout(r, min + Math.random() * (max - min)));
}

async function fetchTicker(ticker) {
  const baseUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=5d`;
  const MAX_RETRIES = 5;

  for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
    for (let i = 0; i < PROXIES.length; i++) {
      try {
        const url = PROXIES[i](baseUrl);
        const isGetEndpoint = i === 1;
        const timeout = 10000 + attempt * 2000;
        const resp = await fetch(url, {signal: AbortSignal.timeout(timeout)});
        if (!resp.ok) continue;
        const json = await resp.json();
        const data = parseYahooResponse(json, isGetEndpoint);
        const result = data.chart?.result?.[0];
        if (!result) continue;
        const meta = result.meta;
        const quotes = result.indicators?.quote?.[0];
        const closes = quotes?.close || [];
        const highs = quotes?.high || [];
        const lows = quotes?.low || [];
        const volumes = quotes?.volume || [];
        const price = meta.regularMarketPrice || closes[closes.length-1] || 0;
        if (price === 0) continue;
        const prevClose = meta.chartPreviousClose || meta.previousClose || closes[0] || price;
        const change = price - prevClose;
        const changePct = prevClose ? (change / prevClose) * 100 : 0;
        const validCloses = closes.filter(c => c != null && c > 0);
        const validHighs = highs.filter(h=>h!=null&&h>0);
        const validLows = lows.filter(l=>l!=null&&l>0);
        const dayHigh = validHighs.length ? Math.max(...validHighs) : (meta.regularMarketDayHigh || price);
        const dayLow = validLows.length ? Math.min(...validLows) : (meta.regularMarketDayLow || price);
        const validVols = volumes.filter(v=>v!=null&&v>0);
        const lastVol = validVols.length ? validVols[validVols.length-1] : (meta.regularMarketVolume || 0);
        etfData[ticker] = {
          price, prevClose, change, changePct,
          high: dayHigh, low: dayLow, volume: lastVol,
          closes: validCloses,
          marketState: meta.marketState || 'CLOSED',
          currency: meta.currency || 'USD'
        };
        loadedCount++;
        updateStatusBar();
        return true;
      } catch(e) {
        continue;
      }
    }
    if (attempt < MAX_RETRIES - 1) {
      await randomDelay(1000 + attempt * 500, 2000 + attempt * 1000);
    }
  }
  const cached = loadFromCache();
  if (cached && cached[ticker] && cached[ticker].price > 0) {
    etfData[ticker] = {...cached[ticker], marketState: 'CACHED'};
    loadedCount++;
    updateStatusBar();
    return true;
  }
  etfData[ticker] = {price:0,prevClose:0,change:0,changePct:0,high:0,low:0,volume:0,closes:[],marketState:'FAILED',currency:'USD'};
  failedTickers.push(ticker);
  updateStatusBar();
  return false;
}

let failedTickers = [];

async function fetchBatch(tickers, batchSize=3) {
  const cached = loadFromCache();
  if (cached) {
    let cacheCount = 0;
    for (const t of tickers) {
      if (cached[t] && cached[t].price > 0) {
        etfData[t] = {...cached[t], marketState: 'CACHED'};
        cacheCount++;
      }
    }
    if (cacheCount > 0) {
      loadedCount = cacheCount;
      updateStatusBar();
      renderAll();
    }
  }

  failedTickers = [];
  // Don't reset loadedCount to 0 — keep preloaded/cached count so cards keep showing data
  for (let i = 0; i < tickers.length; i += batchSize) {
    const batch = tickers.slice(i, i + batchSize);
    await Promise.all(batch.map(t => fetchTicker(t)));
    renderAll();
    if (i + batchSize < tickers.length) {
      await randomDelay(800, 1500);
    }
  }
  if (failedTickers.length > 0) {
    const retries = [...failedTickers];
    failedTickers = [];
    for (let i = 0; i < retries.length; i += 2) {
      const batch = retries.slice(i, i + 2);
      await Promise.all(batch.map(t => fetchTicker(t)));
      renderAll();
      await randomDelay(1500, 3000);
    }
  }
  saveToCache(etfData);
}

function getAllUniqueTickers() {
  return Object.keys(ETF_META);
}

// ========== MARKET STATE ==========
function getMarketStateLabel() {
  const spy = etfData['SPY'];
  if (!spy) return '載入中...';
  const state = spy.marketState;
  const map = {
    'REGULAR': '開市中',
    'PRE': '盤前交易',
    'POST': '盤後交易',
    'PREPRE': '盤前交易',
    'POSTPOST': '盤後交易',
    'CLOSED': '已收市'
  };
  return map[state] || '已收市';
}

// ========== STATUS BAR ==========
function updateStatusBar() {
  const bar = document.getElementById('statusBar');
  const indices = ['SPY','QQQ','DIA','IWM'];
  let html = '';
  indices.forEach(t => {
    const d = etfData[t];
    if (d && d.price > 0) {
      const cls = d.change >= 0 ? 'up' : 'down';
      const arrow = d.change >= 0 ? '▲' : '▼';
      html += `<span class="idx"><strong>${t}</strong> $${d.price.toFixed(2)} <span class="${cls}">${arrow} ${d.changePct.toFixed(2)}%</span></span>`;
    }
  });
  html += `<span class="market-state">${getMarketStateLabel()}</span>`;
  html += `<span class="load-count">已載入: ${loadedCount}/${totalToLoad}</span>`;
  bar.innerHTML = html || '載入市場數據中...';
}

// ========== FORMATTING ==========
function fmtPrice(p) {
  if (!p || p === 0) return '--';
  return '$' + p.toFixed(2);
}
function fmtChange(c, pct) {
  if (c === undefined) return '';
  const sign = c >= 0 ? '+' : '';
  return `${sign}${c.toFixed(2)} (${sign}${pct.toFixed(2)}%)`;
}
function fmtVol(v) {
  if (!v) return '--';
  if (v >= 1e9) return (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(1) + 'K';
  return v.toString();
}

// ========== SPARKLINE ==========
function drawSparkline(canvas, closes, isUp) {
  if (!canvas || !closes || closes.length < 2) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.offsetWidth * 2;
  const h = canvas.height = canvas.offsetHeight * 2;
  ctx.clearRect(0, 0, w, h);
  const min = Math.min(...closes);
  const max = Math.max(...closes);
  const range = max - min || 1;
  const color = isUp ? '#22c55e' : '#ef4444';
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  closes.forEach((c, i) => {
    const x = (i / (closes.length - 1)) * w;
    const y = h - ((c - min) / range) * (h * 0.8) - h * 0.1;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();
  const lastX = w;
  const gradient = ctx.createLinearGradient(0, 0, 0, h);
  gradient.addColorStop(0, isUp ? 'rgba(34,197,94,.15)' : 'rgba(239,68,68,.15)');
  gradient.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.lineTo(lastX, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();
}

// ========== CARD RENDERING ==========
function renderCard(ticker) {
  const meta = ETF_META[ticker] || {name:ticker,cat:'其他'};
  const d = etfData[ticker];
  const isLoaded = d && d.price > 0;
  const isUp = d ? d.change >= 0 : true;
  const cls = isUp ? 'up' : 'down';
  const loadingCls = isLoaded ? '' : ' loading';
  return `<div class="card${loadingCls}" id="card-${ticker}">
    <div class="top-row">
      <span class="ticker-name">${ticker}</span>
      <span class="tag">${meta.cat}</span>
    </div>
    <div class="full-name">${meta.name}</div>
    <div class="price-row">
      <span class="price">${isLoaded ? fmtPrice(d.price) : '<span class="loader"></span>'}</span>
      <span class="change ${cls}">${isLoaded ? fmtChange(d.change, d.changePct) : ''}</span>
    </div>
    <div class="details">
      <span><span class="label">HIGH</span>${isLoaded ? fmtPrice(d.high) : '--'}</span>
      <span><span class="label">LOW</span>${isLoaded ? fmtPrice(d.low) : '--'}</span>
      <span><span class="label">VOL</span>${isLoaded ? fmtVol(d.volume) : '--'}</span>
    </div>
    <div class="sparkline"><canvas id="spark-${ticker}"></canvas></div>
  </div>`;
}

function renderCards(tickers) {
  return '<div class="grid">' + tickers.map(t => renderCard(t)).join('') + '</div>';
}

function drawAllSparklines(tickers) {
  tickers.forEach(t => {
    const d = etfData[t];
    if (d && d.closes.length >= 2) {
      const canvas = document.getElementById('spark-' + t);
      if (canvas) drawSparkline(canvas, d.closes, d.change >= 0);
    }
  });
}

// ========== OVERVIEW TAB ==========
function renderOverview() {
  const all = getAllUniqueTickers();
  const loaded = all.filter(t => etfData[t] && etfData[t].price > 0);
  const gainers = loaded.filter(t => etfData[t].change >= 0);
  const losers = loaded.filter(t => etfData[t].change < 0);
  const sorted = [...loaded].sort((a,b) => etfData[b].changePct - etfData[a].changePct);
  const best = sorted[0];
  const worst = sorted[sorted.length - 1];

  let html = '<div class="summary-row">';
  html += `<div class="summary-card"><h3>追蹤 ETF 數量</h3><div class="val">${all.length}</div><div class="sub">已載入 ${loaded.length} 檔</div></div>`;
  html += `<div class="summary-card"><h3>上漲 / 下跌</h3><div class="val" style="color:var(--green)">${gainers.length} <span style="color:var(--dim);font-size:1rem">/ </span><span style="color:var(--red)">${losers.length}</span></div><div class="sub">${loaded.length ? (gainers.length/loaded.length*100).toFixed(0) : 0}% 上漲</div></div>`;
  html += `<div class="summary-card"><h3>最佳表現</h3><div class="val" style="color:var(--green)">${best ? best : '--'}</div><div class="sub">${best ? fmtChange(etfData[best].change, etfData[best].changePct) : ''}</div></div>`;
  html += `<div class="summary-card"><h3>最差表現</h3><div class="val" style="color:var(--red)">${worst ? worst : '--'}</div><div class="sub">${worst ? fmtChange(etfData[worst].change, etfData[worst].changePct) : ''}</div></div>`;
  html += '</div>';

  html += '<div class="section-title">主要 ETF</div>';
  const mainTickers = TABS.find(t=>t.id==='overview').tickers;
  html += renderCards(mainTickers);

  html += '<div class="section-title" style="margin-top:20px">板塊表現排名</div>';
  html += renderSectorTable();
  return html;
}

function renderSectorTable() {
  const sectors = {};
  for (const [ticker, meta] of Object.entries(ETF_META)) {
    if (!sectors[meta.cat]) sectors[meta.cat] = [];
    const d = etfData[ticker];
    if (d && d.price > 0) {
      sectors[meta.cat].push({ticker, ...d});
    }
  }
  const sectorAvgs = Object.entries(sectors).map(([name, etfs]) => {
    if (etfs.length === 0) return {name, avg:0, count:0, best:'--', worst:'--'};
    const avg = etfs.reduce((s,e)=>s+e.changePct,0)/etfs.length;
    const sorted = [...etfs].sort((a,b)=>b.changePct-a.changePct);
    return {name, avg, count:etfs.length, best:sorted[0]?.ticker||'--', worst:sorted[sorted.length-1]?.ticker||'--'};
  }).sort((a,b) => b.avg - a.avg);

  let html = '<div class="table-wrap"><table><thead><tr><th>#</th><th>板塊</th><th>平均漲跌%</th><th>ETF 數</th><th>最佳</th><th>最差</th></tr></thead><tbody>';
  sectorAvgs.forEach((s, i) => {
    const cls = s.avg >= 0 ? 'up' : 'down';
    const sign = s.avg >= 0 ? '+' : '';
    html += `<tr><td>${i+1}</td><td><strong>${s.name}</strong></td><td class="change ${cls}">${sign}${s.avg.toFixed(2)}%</td><td>${s.count}</td><td>${s.best}</td><td>${s.worst}</td></tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}

// ========== HEATMAP TAB ==========
function renderHeatmap() {
  const all = getAllUniqueTickers();
  const sorted = [...all].sort((a,b) => {
    const da = etfData[a], db = etfData[b];
    const pa = da ? da.changePct : 0, pb = db ? db.changePct : 0;
    return pb - pa;
  });

  let html = '<div class="section-title">全部 ETF 熱力圖 (按漲跌幅排列)</div>';
  html += '<div class="heatmap">';
  sorted.forEach(t => {
    const d = etfData[t];
    const pct = d ? d.changePct : 0;
    const bg = getHeatColor(pct);
    const textColor = Math.abs(pct) > 1 ? '#fff' : 'rgba(255,255,255,.85)';
    const sign = pct >= 0 ? '+' : '';
    html += `<div class="heat-cell" style="background:${bg};color:${textColor}">
      <div class="hp"><strong>${t}</strong></div>
      <div class="ht">${sign}${pct.toFixed(2)}%</div>
      <div class="ht">${d && d.price>0 ? fmtPrice(d.price) : '--'}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function getHeatColor(pct) {
  const intensity = Math.min(Math.abs(pct) / 4, 1);
  if (pct >= 0) {
    const r = Math.round(10 + (22-10) * (1-intensity));
    const g = Math.round(80 + (197-80) * intensity);
    const b = Math.round(30 + (94-30) * intensity * 0.5);
    return `rgb(${r},${g},${b})`;
  } else {
    const r = Math.round(80 + (220-80) * intensity);
    const g = Math.round(20 + (40-20) * (1-intensity));
    const b = Math.round(20 + (40-20) * (1-intensity));
    return `rgb(${r},${g},${b})`;
  }
}

// ========== TABS ==========
function renderNavBar() {
  const nav = document.getElementById('navBar');
  nav.innerHTML = TABS.map(t =>
    `<button class="${t.id === activeTab ? 'active' : ''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function switchTab(tabId) {
  activeTab = tabId;
  renderNavBar();
  renderContent();
}

function renderContent() {
  const main = document.getElementById('mainContent');
  const tab = TABS.find(t => t.id === activeTab);
  if (!tab) return;

  let html = '<div class="section active">';
  if (tab.id === 'overview') {
    html += renderOverview();
  } else if (tab.id === 'heatmap') {
    html += renderHeatmap();
  } else {
    html += `<div class="section-title">${tab.label}</div>`;
    html += renderCards(tab.tickers);
  }
  html += '</div>';
  main.innerHTML = html;

  requestAnimationFrame(() => {
    const tickers = tab.id === 'overview' ? TABS.find(t=>t.id==='overview').tickers : tab.tickers;
    if (tab.id !== 'heatmap') drawAllSparklines(tickers);
  });
}

// ========== RENDER ALL (called after data loads) ==========
function renderAll() {
  renderContent();
}

// ========== REFRESH ==========
async function refreshAll() {
  // Don't reset loadedCount at start — keep showing existing data during refresh
  const allTickers = getAllUniqueTickers();
  totalToLoad = allTickers.length;
  updateStatusBar();

  await fetchBatch(allTickers, 6);

  document.getElementById('lastUpdate').textContent =
    '更新: ' + new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit',second:'2-digit'});

  renderContent();
}

function loadPreloadedData() {
  if (!PRELOADED_DATA || !PRELOADED_DATA.data) return 0;
  let count = 0;
  for (const [ticker, d] of Object.entries(PRELOADED_DATA.data)) {
    if (d.price > 0) {

    totalToLoad = preloadedCount;
    updateStatusBar();
    renderAll();
    const ts = PRELOADED_DATA.timestamp;
