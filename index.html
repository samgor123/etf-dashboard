<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ETF 即時追蹤儀表板</title>
<style>
:root{--bg:#0a0e17;--card:#111827;--card2:#1a2236;--border:#1e2d4a;--text:#e2e8f0;--dim:#8892a8;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--orange:#f59e0b;--cyan:#06b6d4;}
body.light{--bg:#f1f5f9;--card:#ffffff;--card2:#f8fafc;--border:#e2e8f0;--text:#1e293b;--dim:#64748b;--green:#16a34a;--red:#dc2626;--blue:#2563eb;--purple:#7c3aed;--orange:#d97706;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;}
button{cursor:pointer;border:none;background:none;color:var(--text);}
#hdr{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
#logo{font-size:16px;font-weight:700;color:var(--blue);white-space:nowrap;}
#ticker-bar{flex:1;overflow:hidden;font-size:13px;color:var(--dim);display:flex;gap:16px;flex-wrap:nowrap;overflow-x:auto;}
.tb-item{white-space:nowrap;display:flex;gap:4px;}
.tb-item .sym{color:var(--text);font-weight:600;}
#hdr-right{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.hbtn{padding:6px 12px;border-radius:6px;font-size:13px;border:1px solid var(--border);background:var(--card2);color:var(--text);transition:.2s;}
.hbtn:hover{border-color:var(--blue);color:var(--blue);}
.hbtn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
#tabbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:2px;overflow-x:auto;position:sticky;top:53px;z-index:99;}
.tab{padding:10px 14px;font-size:13px;color:var(--dim);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:.2s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}
#main{padding:16px;max-width:1600px;margin:0 auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:.2s;position:relative;min-width:210px;}
.card:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:0 4px 20px rgba(59,130,246,.15);}
.card.selected{border-color:var(--blue);box-shadow:0 0 0 2px rgba(59,130,246,.4);}
.card.alert-active{border-color:var(--orange);animation:alertglow 1.5s ease-in-out infinite;}
@keyframes alertglow{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4);}50%{box-shadow:0 0 12px 4px rgba(245,158,11,.3);}}
.lev-bull-card{border-left:3px solid var(--green);}
.lev-bear-card{border-left:3px solid var(--red);}
.lev-vix-card{border-left:3px solid var(--orange);}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.cticker{font-size:15px;font-weight:700;color:var(--text);}
.cicons{display:flex;gap:4px;}
.cicons button{font-size:14px;padding:2px 4px;border-radius:4px;transition:.15s;opacity:.6;}
.cicons button:hover{opacity:1;background:var(--card2);}
.lev-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-bottom:4px;}
.badge-bull{background:rgba(34,197,94,.2);color:var(--green);border:1px solid rgba(34,197,94,.4);}
.badge-bear{background:rgba(239,68,68,.2);color:var(--red);border:1px solid rgba(239,68,68,.4);}
.badge-vix{background:rgba(245,158,11,.2);color:var(--orange);border:1px solid rgba(245,158,11,.4);}
.cname{font-size:11px;color:var(--dim);margin-bottom:6px;line-height:1.3;}
.cprice{font-size:20px;font-weight:700;margin-bottom:4px;}
.cchange{font-size:13px;font-weight:600;margin-bottom:6px;}
.cchange.up{color:var(--green);}
.cchange.dn{color:var(--red);}
.cchange.flat{color:var(--dim);}
canvas.spark{width:100%;height:50px;display:block;margin-bottom:6px;}
.cdetails{font-size:11px;color:var(--dim);}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-msg{text-align:center;padding:60px 20px;color:var(--dim);}
.heatmap{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0;}
.hm-cell{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:default;min-width:90px;text-align:center;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;min-width:320px;max-width:90vw;animation:modalIn .2s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text);}
.modal label{font-size:13px;color:var(--dim);display:block;margin-bottom:4px;}
.modal input{width:100%;padding:8px 10px;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;margin-bottom:12px;}
.modal-btns{display:flex;gap:8px;margin-top:4px;}
.btn-primary{padding:8px 18px;background:var(--blue);color:#fff;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;}
.btn-secondary{padding:8px 18px;background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:14px;cursor:pointer;}
.btn-danger{padding:8px 18px;background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);border-radius:6px;font-size:14px;cursor:pointer;}
table.ctbl{width:100%;border-collapse:collapse;margin-top:8px;}
table.ctbl th{text-align:left;padding:8px 10px;font-size:12px;color:var(--dim);border-bottom:1px solid var(--border);}
table.ctbl td{padding:8px 10px;font-size:13px;border-bottom:1px solid var(--border);}
footer{text-align:center;padding:20px 16px;color:var(--dim);font-size:11px;border-top:1px solid var(--border);margin-top:24px;}
::-webkit-scrollbar{height:4px;width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div id="hdr">
  <div id="logo">📊 ETF Dashboard</div>
  <div id="ticker-bar"><span style="color:var(--dim)">載入中...</span></div>
  <div id="hdr-right">
    <button class="hbtn" id="comparebtn">⚖ 比較</button>
    <button class="hbtn" id="darkbtn" onclick="toggleDark()">☀ 亮色</button>
    <button class="hbtn" onclick="fetchAll()">↻ 刷新</button>
  </div>
</div>
<div id="tabbar"></div>
<div id="main"></div>
<div class="modal-overlay" id="alert-modal">
  <div class="modal">
    <h3>🔔 設定價格警報 — <span id="alert-ticker-lbl"></span></h3>
    <label>上限警報 (High Alert)</label>
    <input id="alert-hi" type="number" step="0.01" placeholder="留空=不設定">
    <label>下限警報 (Low Alert)</label>
    <input id="alert-lo" type="number" step="0.01" placeholder="留空=不設定">
    <div class="modal-btns">
      <button class="btn-primary" onclick="saveAlert()">儲存</button>
      <button class="btn-danger" onclick="clearAlert()">清除</button>
      <button class="btn-secondary" onclick="closeAlertModal()">取消</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="compare-modal">
  <div class="modal" style="min-width:500px;max-width:95vw;">
    <h3>⚖ ETF 比較</h3>
    <div id="compare-content"></div>
    <div class="modal-btns" style="margin-top:16px;">
      <button class="btn-secondary" onclick="closeCompareModal()">關閉</button>
      <button class="btn-danger" onclick="clearCompare()">清除選擇</button>
    </div>
  </div>
</div>
<footer>數據來源：Yahoo Finance | 自動每 60 秒更新 | 僅供參考，非投資建議 | Built with Nebula AI</footer>
<script>
const TABS=[

  {id:'leverage',label:'槓桿 ETF',tickers:['TQQQ','SOXL','UPRO','FNGU','SPXL','LABU','DFEN','CURE','FAS','UVXY','SQQQ','SPXS','SRTY']},
  {id:'us-index',label:'美股指數',tickers:['SPY','QQQ','DIA','IWM','VTI','VOO']},
  {id:'semi',label:'半導體',tickers:['SMH','SOXX','XSD','PSI','SOXQ']},
  {id:'ai',label:'AI 相關',tickers:['BOTZ','AIQ','ROBT','IRBO','CHAT','AIPI']},
  {id:'ai-infra',label:'AI 基建',tickers:['IGV','CLOU','WCLD','SKYY','HACK','CIBR']},
  {id:'defense',label:'軍工',tickers:['ITA','PPA','XAR','DFEN','SHLD','FITE']},
  {id:'biotech',label:'生物科技',tickers:['XBI','IBB','ARKG','LABU','BIB']},

const META={

  SOXL:{n:'Direxion Semi Bull 3X',cat:'槓桿 ETF',lev:'3x Bull'},

  SPXL:{n:'Direxion S&P500 Bull 3X',cat:'槓桿 ETF',lev:'3x Bull'},
  LABU:{n:'Direxion Biotech Bull 3X',cat:'槓桿 ETF',lev:'3x Bull'},
  DFEN:{n:'Direxion Aerospace 3X',cat:'槓桿 ETF',lev:'3x Bull'},
  CURE:{n:'Direxion Healthcare Bull 3X',cat:'槓桿 ETF',lev:'3x Bull'},

  UVXY:{n:'ProShares Ultra VIX 1.5X',cat:'槓桿 ETF',lev:'1.5x VIX'},
  SQQQ:{n:'ProShares UltraPro Short QQQ',cat:'槓桿 ETF',lev:'3x Bear'},
  SPXS:{n:'Direxion S&P500 Bear 3X',cat:'槓桿 ETF',lev:'3x Bear'},
  SRTY:{n:'Direxion Russell 2000 Bear 3X',cat:'槓桿 ETF',lev:'3x Bear'},
  SPY:{n:'SPDR S&P 500 ETF',cat:'美股指數'},

  SOXX:{n:'iShares Semiconductor',cat:'半導體'},
  XSD:{n:'SPDR S&P Semiconductor',cat:'半導體'},
  PSI:{n:'Invesco Semiconductor',cat:'半導體'},
  SOXQ:{n:'Invesco PHLX Semi',cat:'半導體'},
  BOTZ:{n:'Global X Robotics & AI',cat:'AI 相關'},
  AIQ:{n:'Global X AI & Tech',cat:'AI 相關'},
  ROBT:{n:'First Trust AI & Robotics',cat:'AI 相關'},

  CHAT:{n:'Roundhill Generative AI',cat:'AI 相關'},

  FITE:{n:'SPDR Future Security',cat:'軍工'},
  XBI:{n:'SPDR S&P Biotech',cat:'生物科技'},
  IBB:{n:'iShares Biotechnology',cat:'生物科技'},
  ARKG:{n:'ARK Genomic Revolution',cat:'生物科技'},
  BIB:{n:'ProShares Ultra Biotech',cat:'生物科技'},
  URA:{n:'Global X Uranium',cat:'核電'},
  URNM:{n:'Sprott Uranium Miners',cat:'核電'},
  NLR:{n:'VanEck Uranium+Nuclear',cat:'核電'},
  NUKZ:{n:'Range Nuclear Renaissance',cat:'核電'},
  REMX:{n:'VanEck Rare Earth',cat:'稀土'},
  PICK:{n:'iShares Metals & Mining',cat:'稀土'},
  SLX:{n:'VanEck Steel',cat:'稀土'},
  XME:{n:'SPDR Metals & Mining',cat:'稀土'},
  XLU:{n:'Utilities Select Sector',cat:'電力基建'},
  VPU:{n:'Vanguard Utilities',cat:'電力基建'},
  IDU:{n:'iShares US Utilities',cat:'電力基建'},
  GRID:{n:'First Trust Smart Grid',cat:'電力基建'},
  POWR:{n:'iShares Power Infrastructure',cat:'電力基建'},
  GLD:{n:'SPDR Gold Shares',cat:'貴金屬'},
  IAU:{n:'iShares Gold Trust',cat:'貴金屬'},
  GDX:{n:'VanEck Gold Miners',cat:'貴金屬'},
  GDXJ:{n:'VanEck Jr Gold Miners',cat:'貴金屬'},
  SLV:{n:'iShares Silver Trust',cat:'貴金屬'},
  COPX:{n:'Global X Copper Miners',cat:'貴金屬'}
};
const etfData={};
const watchlist=new Set(JSON.parse(localStorage.getItem('etf_wl')||'[]'));
const alerts=JSON.parse(localStorage.getItem('etf_alerts')||'{}');
const compareSet=new Set();
let compareMode=false;
let activeTab='overview';
let darkMode=localStorage.getItem('etf_dark')!=='false';
let alertTicker='';
let loadedCount=0;
let totalCount=0;
const ALL_TICKERS=[...new Set(TABS.flatMap(t=>t.tickers))];

function fmt(v,d=2){return v==null?'--':(+v).toFixed(d);}
function fmtVol(v){if(!v)return '--';if(v>=1e9)return(v/1e9).toFixed(1)+'B';if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(0)+'K';return String(v);}

function getLevClass(t){const m=META[t];if(!m||!m.lev)return'';if(m.lev==='3x Bull')return'lev-bull-card';if(m.lev==='3x Bear')return'lev-bear-card';if(m.lev==='1.5x VIX')return'lev-vix-card';return'';}
function getLevBadge(t){const m=META[t];if(!m||!m.lev)return'';if(m.lev==='3x Bull')return'<span class="lev-badge badge-bull">3x Bull</span>';if(m.lev==='3x Bear')return'<span class="lev-badge badge-bear">3x Bear</span>';if(m.lev==='1.5x VIX')return'<span class="lev-badge badge-vix">1.5x VIX</span>';return'';}

function renderCard(ticker){
  const d=etfData[ticker]||{};
  const m=META[ticker]||{n:ticker,cat:''};
  const lc=getLevClass(ticker);
  const inWL=watchlist.has(ticker);
  const isAlert=d.alertActive?'alert-active':'';
  const priceHtml=d.price!=null?'$'+fmt(d.price):'<span class="spin"></span>';
  let chgHtml='<div class="cchange flat">--</div>';
  if(d.change!=null){
    const cls=d.change>0?'up':d.change<0?'dn':'flat';
    const s=d.change>0?'+':'';
    chgHtml='<div class="cchange '+cls+'">'+s+fmt(d.change)+' ('+s+fmt(d.changePct)+'%)</div>';
  }
  const det='H:'+fmt(d.high)+' | L:'+fmt(d.low)+' | Vol:'+fmtVol(d.vol);
  const star=inWL?'⭐':'☆';
  return '<div class="card '+lc+' '+isAlert+'" data-ticker="'+ticker+'" onclick="cardClick(this,\''+ticker+'\')">'
    +'<div class="ch"><span class="cticker">'+ticker+'</span>'
    +'<div class="cicons">'
    +'<button onclick="toggleWatch(event,\''+ticker+'\')" title="自選">'+star+'</button>'
    +'<button onclick="openAlert(event,\''+ticker+'\')" title="警報">🔔</button>'
    +'</div></div>'
    +getLevBadge(ticker)
    +'<div class="cname">'+m.n+'</div>'
    +'<div class="cprice">'+priceHtml+'</div>'
    +chgHtml
    +'<canvas class="spark" data-t="'+ticker+'" width="200" height="50"></canvas>'
    +'<div class="cdetails">'+det+'</div>'
    +'</div>';
}

function drawSparkline(canvas,closes,isUp){
  const vals=closes.filter(v=>v!=null&&!isNaN(v));
  if(vals.length<2)return;
  const W=canvas.offsetWidth||200,H=50;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const pts=vals.map((v,i)=>({x:i*(W/(vals.length-1)),y:H-((v-mn)/rng)*(H-6)-3}));
  const color=isUp?'#22c55e':'#ef4444';
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,isUp?'rgba(34,197,94,.4)':'rgba(239,68,68,.4)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
}

function drawAllSparklines(){
  document.querySelectorAll('canvas.spark').forEach(c=>{
    const t=c.dataset.t,d=etfData[t];
    if(d&&d.closes&&d.closes.length>=2)drawSparkline(c,d.closes,d.change>=0);
  });
}

function renderTab(tabId){
  const main=document.getElementById('main');
  if(tabId==='heatmap'){main.innerHTML=renderHeatmap();return;}
  if(tabId==='watchlist'){
    if(watchlist.size===0){main.innerHTML='<div class="empty-msg">尚未加入自選<br><small>點擊卡片上的 ☆ 加入自選清單</small></div>';return;}
    main.innerHTML='<div class="grid">'+[...watchlist].map(renderCard).join('')+'</div>';
    drawAllSparklines();return;
  }
  const tab=TABS.find(t=>t.id===tabId);
  if(!tab){main.innerHTML='';return;}
  main.innerHTML='<div class="grid">'+tab.tickers.map(renderCard).join('')+'</div>';
  drawAllSparklines();
}

function renderHeatmap(){
  const cells=ALL_TICKERS.map(t=>{
    const d=etfData[t]||{},pct=d.changePct||0;
    const abs=Math.min(Math.abs(pct)/5,1);
    let bg,tc;
    if(pct>0){bg='rgba(34,197,94,'+(0.15+abs*0.6)+')';tc='#22c55e';}
    else if(pct<0){bg='rgba(239,68,68,'+(0.15+abs*0.6)+')';tc='#ef4444';}
    else{bg='rgba(136,146,168,0.15)';tc='var(--dim)';}
    const s=pct>0?'+':'';
    return '<div class="hm-cell" style="background:'+bg+';color:'+tc+'" title="'+(META[t]&&META[t].n||t)+'"><div style="font-size:13px;font-weight:700">'+t+'</div><div style="font-size:12px">'+(d.changePct!=null?s+fmt(pct)+'%':'--')+'</div></div>';
  }).join('');
  return '<div style="margin-bottom:12px;color:var(--dim);font-size:13px">全部 '+ALL_TICKERS.length+' 支 ETF 漲跌幅熱力圖</div><div class="heatmap">'+cells+'</div>';
}

function buildTabs(){
  document.getElementById('tabbar').innerHTML=TABS.map(t=>'<div class="tab'+(t.id===activeTab?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</div>').join('');
}

function switchTab(tabId){activeTab=tabId;buildTabs();renderTab(tabId);}

function toggleDark(){
  darkMode=!darkMode;
  document.body.classList.toggle('light',!darkMode);
  localStorage.setItem('etf_dark',darkMode);
  document.getElementById('darkbtn').textContent=darkMode?'☀ 亮色':'🌙 暗色';
}

function toggleWatch(e,ticker){
  e.stopPropagation();
  if(watchlist.has(ticker))watchlist.delete(ticker);else watchlist.add(ticker);
  localStorage.setItem('etf_wl',JSON.stringify([...watchlist]));
  renderTab(activeTab);
}

function cardClick(el,ticker){
  if(!compareMode)return;
  if(compareSet.has(ticker)){compareSet.delete(ticker);el.classList.remove('selected');}
  else{compareSet.add(ticker);el.classList.add('selected');}
  const btn=document.getElementById('comparebtn');
  if(compareSet.size>=2){btn.textContent='⚖ 比較 ('+compareSet.size+')';btn.classList.add('active');}
  else{btn.textContent='⚖ 比較模式';btn.classList.remove('active');}
}

function toggleCompare(){
  compareMode=!compareMode;
  const btn=document.getElementById('comparebtn');
  if(!compareMode){
    btn.classList.remove('active');btn.textContent='⚖ 比較';
    compareSet.clear();document.querySelectorAll('.card.selected').forEach(c=>c.classList.remove('selected'));
  } else {
    btn.classList.add('active');btn.textContent='⚖ 比較模式';
  }
}

function openCompareModal(){
  if(compareSet.size<2)return;
  const rows=[...compareSet].map(t=>{
    const d=etfData[t]||{};
    const s=(d.changePct||0)>0?'+':'';
    const cls=(d.changePct||0)>0?'up':(d.changePct||0)<0?'dn':'flat';
    return '<tr><td><strong>'+t+'</strong><br><small style="color:var(--dim)">'+(META[t]&&META[t].n||'')+'</small></td><td>$'+fmt(d.price)+'</td><td class="cchange '+cls+'">'+s+fmt(d.changePct)+'%</td><td>$'+fmt(d.high)+'</td><td>$'+fmt(d.low)+'</td><td>'+fmtVol(d.vol)+'</td></tr>';
  }).join('');
  document.getElementById('compare-content').innerHTML='<table class="ctbl"><thead><tr><th>ETF</th><th>價格</th><th>漲跌%</th><th>最高</th><th>最低</th><th>成交量</th></tr></thead><tbody>'+rows+'</tbody></table>';
  document.getElementById('compare-modal').classList.add('open');
}
function closeCompareModal(){document.getElementById('compare-modal').classList.remove('open');}
function clearCompare(){
  compareSet.clear();
  document.querySelectorAll('.card.selected').forEach(c=>c.classList.remove('selected'));
  document.getElementById('comparebtn').textContent='⚖ 比較';
  document.getElementById('comparebtn').classList.remove('active');
  closeCompareModal();
}

document.getElementById('comparebtn').addEventListener('click',()=>{
  if(compareMode&&compareSet.size>=2)openCompareModal();else toggleCompare();
});

function openAlert(e,ticker){
  e.stopPropagation();
  alertTicker=ticker;
  document.getElementById('alert-ticker-lbl').textContent=ticker;
  document.getElementById('alert-hi').value=(alerts[ticker]&&alerts[ticker].hi)||'';
  document.getElementById('alert-lo').value=(alerts[ticker]&&alerts[ticker].lo)||'';
  document.getElementById('alert-modal').classList.add('open');
}
function closeAlertModal(){document.getElementById('alert-modal').classList.remove('open');alertTicker='';}
function saveAlert(){
  if(!alertTicker)return;
  const hi=parseFloat(document.getElementById('alert-hi').value)||null;
  const lo=parseFloat(document.getElementById('alert-lo').value)||null;
  alerts[alertTicker]={hi,lo};
  localStorage.setItem('etf_alerts',JSON.stringify(alerts));
  closeAlertModal();renderTab(activeTab);
}
function clearAlert(){
  if(!alertTicker)return;
  delete alerts[alertTicker];
  localStorage.setItem('etf_alerts',JSON.stringify(alerts));
  closeAlertModal();renderTab(activeTab);
}
function checkAlerts(){
  ALL_TICKERS.forEach(t=>{
    const d=etfData[t];if(!d||d.price==null)return;
    const al=alerts[t];if(!al)return;
    const triggered=(al.hi&&d.price>=al.hi)||(al.lo&&d.price<=al.lo);
    d.alertActive=!!triggered;
    if(triggered&&typeof Notification!=='undefined'&&Notification.permission==='granted'){
      try{new Notification('ETF Alert: '+t,{body:'Price $'+fmt(d.price)+' triggered your alert'});}catch(e){}
    }
  });
}

document.getElementById('alert-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAlertModal();});
document.getElementById('compare-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeCompareModal();});

const CACHE_KEY='etf_v3_cache';
const CACHE_TTL=24*3600*1000;

function loadCache(){
  try{
    const c=JSON.parse(localStorage.getItem(CACHE_KEY)||'{}'),now=Date.now(),out={};
    Object.entries(c).forEach(([k,v])=>{if(now-v.ts<CACHE_TTL)out[k]=v.data;});
    return out;
  }catch{return{};}
}
function saveCache(ticker,data){
  try{
    const c=JSON.parse(localStorage.getItem(CACHE_KEY)||'{}');
    c[ticker]={ts:Date.now(),data};
    localStorage.setItem(CACHE_KEY,JSON.stringify(c));
  }catch{}
}

async function fetchTicker(ticker){
  const url='https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?interval=1d&range=5d';
  const proxy='https://api.allorigins.win/raw?url='+encodeURIComponent(url);
  try{
    const r=await fetch(proxy,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    const meta=j&&j.chart&&j.chart.result&&j.chart.result[0]&&j.chart.result[0].meta;
    const quote=j&&j.chart&&j.chart.result&&j.chart.result[0]&&j.chart.result[0].indicators&&j.chart.result[0].indicators.quote&&j.chart.result[0].indicators.quote[0];
    if(!meta)throw new Error('no meta');
    const closes=(quote&&quote.close||[]).filter(v=>v!=null);
    const prev=meta.previousClose||meta.chartPreviousClose||(closes.length>1?closes[closes.length-2]:null);
    const price=meta.regularMarketPrice||(closes.length?closes[closes.length-1]:null);
    const change=(price!=null&&prev!=null)?price-prev:null;
    const changePct=(change!=null&&prev)?change/prev*100:null;
    const data={price,prevClose:prev,high:meta.regularMarketDayHigh,low:meta.regularMarketDayLow,vol:meta.regularMarketVolume,change,changePct,closes,marketState:meta.marketState,currency:meta.currency};
    etfData[ticker]=data;saveCache(ticker,data);return data;
  }catch{
    const cached=loadCache()[ticker];
    if(cached)etfData[ticker]=cached;
    return null;
  }
}

function updateTickerBar(){
  const bar=document.getElementById('ticker-bar');
  const keys=['SPY','QQQ','SMH','DIA','IWM'];
  const items=keys.filter(t=>etfData[t]&&etfData[t].price!=null).map(t=>{
    const d=etfData[t],s=d.change>0?'+':'',col=d.change>0?'#22c55e':d.change<0?'#ef4444':'#8892a8';
    return '<span class="tb-item"><span class="sym">'+t+'</span><span style="color:var(--text)">$'+fmt(d.price)+'</span><span style="color:'+col+'">'+s+fmt(d.changePct)+'%</span></span>';
  }).join('');
  bar.innerHTML=items+'<span style="margin-left:auto;color:var(--dim);font-size:12px">已載入: '+loadedCount+'/'+totalCount+'</span>';
}

async function fetchAll(){
  totalCount=ALL_TICKERS.length;loadedCount=0;
  const cache=loadCache();
  ALL_TICKERS.forEach(t=>{if(cache[t])etfData[t]=cache[t];});
  renderTab(activeTab);updateTickerBar();
  for(let i=0;i<ALL_TICKERS.length;i+=3){
    const batch=ALL_TICKERS.slice(i,i+3);
    await Promise.all(batch.map(t=>fetchTicker(t).then(()=>{loadedCount++;updateTickerBar();})));
    if(i+3<ALL_TICKERS.length)await new Promise(r=>setTimeout(r,800));
  }
  checkAlerts();renderTab(activeTab);updateTickerBar();
}

document.addEventListener('DOMContentLoaded',()=>{
  document.body.classList.toggle('light',!darkMode);
  document.getElementById('darkbtn').textContent=darkMode?'☀ 亮色':'🌙 暗色';
  buildTabs();switchTab('overview');fetchAll();
  setInterval(fetchAll,60000);
  if(typeof Notification!=='undefined'&&Notification.permission==='default')Notification.requestPermission();
});
</script>
